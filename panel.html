<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Net Flow · Panel</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0d1b2e;color:#e2e8f0;min-height:100vh}

/* Login */
#loginScreen{display:flex;align-items:center;justify-content:center;min-height:100vh}
.login-box{background:#1a2e4a;border:1px solid #2a4a6b;border-radius:16px;padding:40px;width:340px;text-align:center}
.login-box .logo{font-size:22px;font-weight:800;color:#fff;margin-bottom:6px;letter-spacing:-.5px}
.login-box small{color:#64748b;font-size:13px;display:block;margin-bottom:28px}
.login-box input{width:100%;padding:12px 14px;background:#0d1b2e;border:1.5px solid #2a4a6b;border-radius:9px;color:#fff;font-size:14px;margin-bottom:14px;outline:none}
.login-box input:focus{border-color:#3b82f6}
.login-box button{width:100%;padding:12px;background:#3b82f6;border:none;border-radius:9px;color:#fff;font-weight:700;font-size:14px;cursor:pointer}
.login-box button:hover{background:#2563eb}
.login-err{color:#f87171;font-size:13px;margin-top:10px;display:none}

/* App */
#app{display:none}
.topbar{background:#1a2e4a;border-bottom:1px solid #1e3a5f;padding:14px 24px;display:flex;align-items:center;gap:16px;position:sticky;top:0;z-index:100}
.topbar .brand{font-weight:800;font-size:16px;color:#fff}
.topbar .brand span{color:#3b82f6}
.topbar .stats{display:flex;gap:20px;margin-left:auto;align-items:center}
.stat{text-align:center}
.stat .n{font-size:20px;font-weight:700;color:#3b82f6}
.stat .l{font-size:10px;color:#64748b;text-transform:uppercase;letter-spacing:.06em}
.tbtn{padding:8px 14px;border-radius:8px;border:1px solid #2a4a6b;background:rgba(255,255,255,.04);color:#e2e8f0;font-size:13px;font-weight:600;cursor:pointer;transition:.13s}
.tbtn:hover{background:rgba(255,255,255,.1)}
.tbtn.primary{background:#3b82f6;border-color:#3b82f6;color:#fff}
.tbtn.primary:hover{background:#2563eb}

.filters{padding:14px 24px;display:flex;gap:10px;flex-wrap:wrap;border-bottom:1px solid #1e3a5f;background:#162236}
.fsearch{flex:1;min-width:200px;position:relative}
.fsearch input{width:100%;padding:9px 12px 9px 34px;background:#0d1b2e;border:1.5px solid #1e3a5f;border-radius:9px;color:#e2e8f0;font-size:13.5px;outline:none}
.fsearch input:focus{border-color:#3b82f6}
.fsearch svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:#64748b}
select.fsel{padding:9px 12px;background:#0d1b2e;border:1.5px solid #1e3a5f;border-radius:9px;color:#e2e8f0;font-size:13px;outline:none;cursor:pointer}
select.fsel:focus{border-color:#3b82f6}

.table-wrap{padding:16px 24px;overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13.5px}
th{text-align:left;padding:10px 12px;color:#64748b;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;border-bottom:1px solid #1e3a5f;white-space:nowrap}
td{padding:11px 12px;border-bottom:1px solid #1a2e4a;vertical-align:middle}
tr:hover td{background:#1a2e4a}
.company-name{font-weight:600;color:#fff}
.country-badge{display:inline-block;font-size:11px;padding:2px 8px;border-radius:20px;background:#1e3a5f;color:#93c5fd;font-weight:600}
.sector-badge{display:inline-block;font-size:11px;padding:2px 8px;border-radius:20px;font-weight:600}
.s-oil{background:#422006;color:#fb923c}
.s-water{background:#0c2340;color:#60a5fa}
.s-mining{background:#2e1065;color:#c084fc}
.s-chemical{background:#052e16;color:#4ade80}
.s-energy{background:#450a0a;color:#f87171}
a.site-link{color:#60a5fa;text-decoration:none;font-size:12.5px}
a.site-link:hover{text-decoration:underline}
.email-cell{font-family:monospace;font-size:12px;color:#94a3b8}
.email-cell a{color:#60a5fa}
.status-sel{padding:5px 8px;border-radius:7px;border:1px solid #2a4a6b;background:#0d1b2e;color:#e2e8f0;font-size:12px;cursor:pointer;outline:none}
.notes-input{padding:5px 8px;border-radius:7px;border:1px solid #2a4a6b;background:#0d1b2e;color:#e2e8f0;font-size:12px;width:160px;outline:none}
.notes-input:focus{border-color:#3b82f6}
.dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:5px}
.d-pending{background:#64748b}.d-sent{background:#3b82f6}.d-replied{background:#f59e0b}.d-interested{background:#22c55e}.d-notint{background:#ef4444}

.empty{text-align:center;padding:60px;color:#475569}
.compose-btn{padding:5px 10px;background:#1e3a5f;border:1px solid #3b82f6;border-radius:7px;color:#60a5fa;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap}
.compose-btn:hover{background:#3b82f6;color:#fff}
.toast{position:fixed;bottom:24px;right:24px;background:#1e3a5f;border:1px solid #3b82f6;color:#fff;padding:12px 20px;border-radius:10px;font-size:14px;font-weight:600;z-index:9999;transform:translateY(60px);opacity:0;transition:.3s}
.toast.show{transform:translateY(0);opacity:1}

/* Mail Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:1000;display:none;align-items:center;justify-content:center;padding:20px}
.modal-overlay.open{display:flex}
.modal-box{background:#1a2e4a;border:1px solid #2a4a6b;border-radius:16px;width:100%;max-width:640px;max-height:85vh;display:flex;flex-direction:column}
.modal-head{padding:16px 20px;border-bottom:1px solid #1e3a5f;display:flex;align-items:center;gap:12px}
.modal-head h3{font-size:14px;font-weight:700;color:#fff;flex:1}
.modal-close{background:none;border:none;color:#64748b;cursor:pointer;font-size:20px;line-height:1;padding:4px}
.modal-close:hover{color:#fff}
.modal-body{padding:20px;overflow-y:auto;flex:1}
.mail-field{margin-bottom:14px}
.mail-field label{display:block;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#64748b;margin-bottom:5px}
.mail-field .val{background:#0d1b2e;border:1px solid #1e3a5f;border-radius:8px;padding:10px 12px;font-size:13px;color:#e2e8f0}
.mail-field .val.body{white-space:pre-wrap;line-height:1.6;font-family:inherit}
.modal-foot{padding:12px 20px;border-top:1px solid #1e3a5f;display:flex;gap:8px;justify-content:flex-end}
.view-btn{padding:5px 10px;background:#162236;border:1px solid #2a4a6b;border-radius:7px;color:#94a3b8;font-size:12px;font-weight:600;cursor:pointer}
.view-btn:hover{border-color:#3b82f6;color:#60a5fa}

</head>

<!-- LOGIN -->
<div id="loginScreen">

    <small>Lead Takip Sistemi</small>

  </div>
</div>

<!-- APP -->

    </div>

    <button class="tbtn" onclick="exportCSV()">CSV İndir</button>
    <button class="tbtn primary" onclick="addLead()">+ Lead Ekle</button>
  </div>

  <div class="filters">
    <div class="fsearch">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4-4"/></svg>
      <input id="searchInput" placeholder="Firma, ülke, email ara..." oninput="renderTable()">
    </div>
    <select class="fsel" id="filterCountry" onchange="renderTable()">
      <option value="">Tüm Ülkeler</option>
      <option>Kazakistan</option>
      <option>Azerbaycan</option>
      <option>Özbekistan</option>
      <option>Türkmenistan</option>
      <option>Tacikistan</option>
      <option>Kırgızistan</option>
      <option>Moğolistan</option>
      <option>Irak</option>
    </select>
    <select class="fsel" id="filterSector" onchange="renderTable()">
      <option value="">Tüm Sektörler</option>
      <option>Petrol &amp; Gaz</option>
      <option>Maden</option>
      <option>Su</option>
      <option>Kimya</option>
      <option>Enerji</option>
    </select>
    <select class="fsel" id="filterStatus" onchange="renderTable()">
      <option value="">Tüm Durumlar</option>
      <option value="pending">Bekliyor</option>
      <option value="sent">Mail Atıldı</option>
      <option value="replied">Yanıt Geldi</option>
      <option value="interested">İlgilendi</option>
      <option value="notint">İlgilenmedi</option>
    </select>
  </div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>Firma</th>
          <th>Ülke</th>
          <th>Sektör</th>
          <th>Website</th>
          <th>Email / Contact</th>
          <th>Durum</th>
          <th>Mail Tarihi</th>
          <th>Notlar</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="leadsBody"></tbody>
    </table>
    <div class="empty" id="emptyState" style="display:none">Sonuç bulunamadı</div>
  </div>
</div>

<div class="toast" id="toast"></div>

<!-- MAIL MODAL -->
<div class="modal-overlay" id="mailModal" onclick="if(event.target===this)closeModal()">
  <div class="modal-box">
    <div class="modal-head">
      <h3 id="modalCompany">Mail İçeriği</h3>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="mail-field">
        <label>Gönderen</label>
        <div class="val">info@netflw.com (Net Flow)</div>
      </div>
      <div class="mail-field">
        <label>Alıcı</label>
        <div class="val" id="modalTo"></div>
      </div>
      <div class="mail-field">
        <label>Konu</label>
        <div class="val" id="modalSubject"></div>
      </div>
      <div class="mail-field">
        <label>İçerik</label>
        <div class="val body" id="modalBody"></div>
      </div>
    </div>
    <div class="modal-foot">
      <button class="view-btn" onclick="copyMailContent()">Kopyala</button>
      <button class="view-btn" onclick="closeModal()">Kapat</button>
    </div>
  </div>
</div>

// --- STATE ---
let leads = [];
let nextId = 100;

async function loadData(){
  // 1. Fetch server data (crm-data.json — updated by Gmail sync)
  let serverLeads = null;
  let serverMeta = null;
  try{
    const resp = await fetch('/crm-data.json?_='+Date.now());
    if(resp.ok){ const d=await resp.json(); serverLeads=d.leads; serverMeta=d.meta; }
  }catch(e){}

  const base = serverLeads || DEFAULT_LEADS;

  // 2. Load local overrides (user's manual changes)
  let localMap = {};
  try{
    const raw = localStorage.getItem(KEY);
    if(raw){
      const d = JSON.parse(raw);
      (d.leads||[]).forEach(l=>{ localMap[l.id]=l; });
      nextId = d.nextId || 100;
    }
  }catch(e){}

  // 3. Merge: server is base, local overrides status/sentDate/notes/email per lead
  leads = base.map(l=>{
    const ov = localMap[l.id];
    if(ov) return {...l, status:ov.status||l.status, sentDate:ov.sentDate||l.sentDate, notes:ov.notes||l.notes, email:ov.email||l.email};
    return {...l};
  });

  // 4. Add any leads manually added locally (id >= 100)
  Object.values(localMap).filter(l=>l.id>=100).forEach(l=>{
    if(!leads.find(x=>x.id===l.id)) leads.push(l);
  });

  // 5. Show last Gmail sync time
  if(serverMeta && serverMeta.lastSync){
    const d = new Date(serverMeta.lastSync);
    const el = document.getElementById('syncBadge');
    if(el) el.textContent = 'Gmail sync: '+d.toLocaleDateString('tr-TR')+' '+d.toTimeString().slice(0,5) + (serverMeta.syncNote?' · '+serverMeta.syncNote:'');
  }

  renderTable();
}

async function reloadFromServer(){
  // Clear local overrides and reload fresh from server
  localStorage.removeItem(KEY);
  leads=[]; nextId=100;
  document.getElementById('syncBadge').textContent='Yükleniyor...';
  await loadData();
  showToast('Sunucudan yüklendi');
}

function save(){
  localStorage.setItem(KEY,JSON.stringify({leads,nextId}));
  updateStats();
}

function exportCSV(){

function previewMail(id){
  const l = leads.find(x=>x.id===id);
  if(!l) return;
  const {subject, body} = getMailContent(l);
  document.getElementById('modalCompany').textContent = l.company + ' — Mail İçeriği';
  document.getElementById('modalTo').textContent = l.email || '(email yok)';
  document.getElementById('modalSubject').textContent = subject;
  document.getElementById('modalBody').textContent = body;
  document.getElementById('mailModal').classList.add('open');
}

function closeModal(){
  document.getElementById('mailModal').classList.remove('open');
}

function copyMailContent(){
  const subj = document.getElementById('modalSubject').textContent;
  const body = document.getElementById('modalBody').textContent;
  navigator.clipboard.writeText('Konu: ' + subj + '\n\n' + body);
  showToast('Kopyalandı');
}

function showToast(msg){
  const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}
