<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quotation Builder, Admin | Net Flow</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;450;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/pmeters.css">
<script>(function(){try{var t=JSON.parse(localStorage.getItem('pm_tweaks')||'{}');var A={blue:['#1E88E5','#1565C0'],cobalt:['#3B5BDB','#2C45B8'],teal:['#0E8C8C','#0A6E6E'],azure:['#2A6FDB','#1F54AB']};var R={sharp:['6px','10px','12px'],normal:['12px','16px','22px'],round:['16px','22px','30px']};var F={jakarta:'"Plus Jakarta Sans"',grotesk:'"Space Grotesk"'};var r=document.documentElement;if(t.accent&&A[t.accent]){r.style.setProperty('--accent',A[t.accent][0]);r.style.setProperty('--accent-700',A[t.accent][1]);}if(t.radius&&R[t.radius]){r.style.setProperty('--r',R[t.radius][0]);r.style.setProperty('--r-lg',R[t.radius][1]);r.style.setProperty('--r-xl',R[t.radius][2]);}if(t.font&&F[t.font]){r.style.setProperty('--f-head',F[t.font]+',-apple-system,sans-serif');}}catch(e){}})();</script>
<style>
  body{background:var(--bg-alt);font-size:15px}
  /* admin top bar */
  .abar{position:sticky;top:0;z-index:50;background:var(--navy-900);color:#fff;border-bottom:1px solid var(--navy-line)}
  .abar-in{max-width:1500px;margin:0 auto;display:flex;align-items:center;gap:18px;padding:12px clamp(16px,3vw,28px)}
  .abar .brand{color:#fff}
  .abar .brand small{color:#7f93a8}
  .abar .atag{font-family:var(--f-mono);font-size:10.5px;letter-spacing:.16em;text-transform:uppercase;color:var(--blue-300);border:1px solid var(--navy-line);padding:5px 10px;border-radius:7px}
  .abar-actions{margin-left:auto;display:flex;align-items:center;gap:10px}
  .cur-select{display:flex;align-items:center;gap:6px;background:rgba(255,255,255,.05);border:1px solid var(--navy-line);border-radius:9px;padding:4px 6px}
  .cur-select select{background:none;border:none;color:#fff;font-family:var(--f-mono);font-size:13px;font-weight:600;cursor:pointer;outline:none}
  .cur-select select option{color:#0A1628}
  .abtn{display:inline-flex;align-items:center;gap:7px;font-family:var(--f-head);font-weight:600;font-size:13.5px;padding:9px 15px;border-radius:9px;border:1px solid var(--navy-line);background:rgba(255,255,255,.05);color:#fff;cursor:pointer;transition:.15s;white-space:nowrap}
  .abtn:hover{background:rgba(255,255,255,.12)}
  .abtn svg{width:15px;height:15px}
  .abtn.primary{background:var(--accent);border-color:var(--accent)}
  .abtn.primary:hover{background:var(--accent-700)}
  .abtn.ghost{background:none}

  /* layout */
  .admin-wrap{max-width:1500px;margin:0 auto;display:grid;grid-template-columns:340px 1fr;gap:22px;padding:22px clamp(16px,3vw,28px) 80px;align-items:start}

  /* palette */
  .palette{position:sticky;top:80px;background:#fff;border:1px solid var(--line);border-radius:var(--r-lg);box-shadow:var(--shadow-sm);overflow:hidden;max-height:calc(100vh - 102px);display:flex;flex-direction:column}
  .palette-head{padding:16px 16px 12px;border-bottom:1px solid var(--line)}
  .palette-head h3{font-size:15px;display:flex;align-items:center;gap:8px}
  .palette-head h3 .n{font-family:var(--f-mono);font-size:11px;color:var(--ink-3);font-weight:600;margin-left:auto}
  .psearch{position:relative;margin-top:12px}
  .psearch input{width:100%;font-family:var(--f-body);font-size:13.5px;padding:9px 12px 9px 34px;border:1.5px solid var(--line-2);border-radius:9px}
  .psearch input:focus{outline:none;border-color:var(--accent)}
  .psearch svg{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--ink-3)}
  .pcats{display:flex;gap:5px;flex-wrap:wrap;margin-top:10px}
  .pcat{font-family:var(--f-head);font-weight:600;font-size:11.5px;padding:6px 10px;border-radius:999px;border:1.5px solid var(--line-2);background:#fff;color:var(--ink-2);cursor:pointer;transition:.15s}
  .pcat.on{background:var(--navy-900);border-color:var(--navy-900);color:#fff}
  .plist{overflow-y:auto;padding:10px}
  .pitem{display:flex;gap:11px;align-items:center;padding:10px;border-radius:10px;border:1px solid transparent;cursor:pointer;transition:.13s}
  .pitem:hover{background:var(--bg-alt);border-color:var(--line)}
  .pitem .pic{width:40px;height:40px;border-radius:9px;background:var(--navy-900);color:var(--blue-300);display:grid;place-items:center;flex:none}
  .pitem .pic svg{width:24px;height:24px}
  .pitem .pmeta{min-width:0;flex:1}
  .pitem .pmeta b{font-family:var(--f-head);font-size:13.5px;font-weight:600;display:block;line-height:1.2}
  .pitem .pmeta span{font-family:var(--f-mono);font-size:10.5px;color:var(--accent);letter-spacing:.04em}
  .pitem .padd{width:26px;height:26px;border-radius:7px;border:1px solid var(--line-2);background:#fff;color:var(--accent);display:grid;place-items:center;flex:none;font-size:16px;line-height:1}
  .pitem:hover .padd{background:var(--accent);color:#fff;border-color:var(--accent)}

  /* sheet */
  .sheet{display:flex;flex-direction:column;gap:18px;min-width:0}
  .card2{background:#fff;border:1px solid var(--line);border-radius:var(--r-lg);box-shadow:var(--shadow-sm)}
  .card2-head{padding:16px 20px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:10px}
  .card2-head h3{font-size:15.5px}
  .card2-head .hint{font-family:var(--f-mono);font-size:11px;color:var(--ink-3);margin-left:auto}
  .card2-body{padding:18px 20px}

  /* meta + customer grid */
  .meta-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
  .ad-field{display:flex;flex-direction:column;gap:5px}
  .ad-field.col2{grid-column:span 2}
  .ad-field label{font-family:var(--f-mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-3)}
  .ad-field input,.ad-field select,.ad-field textarea{font-family:var(--f-body);font-size:14px;padding:9px 11px;border:1.5px solid var(--line-2);border-radius:8px;background:#fff;color:var(--ink);width:100%}
  .ad-field input:focus,.ad-field select:focus,.ad-field textarea:focus{outline:none;border-color:var(--accent)}

  /* line items */
  .items-empty{padding:48px 20px;text-align:center;color:var(--ink-3)}
  .items-empty svg{width:42px;height:42px;color:var(--line-2);margin-bottom:12px}
  .items-empty p{font-size:14px}
  .litem{padding:16px 20px;border-bottom:1px solid var(--line);display:grid;grid-template-columns:1fr;gap:12px}
  .litem:last-child{border-bottom:none}
  .litem-top{display:flex;gap:12px;align-items:flex-start}
  .litem-no{font-family:var(--f-mono);font-size:12px;color:var(--ink-3);width:24px;flex:none;padding-top:3px}
  .litem-main{flex:1;min-width:0}
  .litem-main h4{font-size:15px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
  .litem-main h4 .lcode{font-family:var(--f-mono);font-size:11px;color:var(--accent);font-weight:600}
  .litem-desc{font-size:13px;color:var(--ink-2);margin-top:6px;line-height:1.55;max-width:70ch}
  .litem-remove{width:28px;height:28px;border-radius:7px;border:1px solid var(--line-2);background:#fff;color:var(--ink-3);cursor:pointer;flex:none;display:grid;place-items:center}
  .litem-remove:hover{border-color:#e0556a;color:#e0556a}
  .cfg-row{display:flex;gap:8px;flex-wrap:wrap}
  .cfg-pick{display:flex;flex-direction:column;gap:3px}
  .cfg-pick label{font-family:var(--f-mono);font-size:9px;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-3)}
  .cfg-pick select{font-family:var(--f-body);font-size:12.5px;padding:6px 8px;border:1px solid var(--line-2);border-radius:7px;background:var(--bg-alt);cursor:pointer}
  .cfg-pick select:focus{outline:none;border-color:var(--accent)}
  .litem-money{display:flex;align-items:center;gap:14px;justify-content:flex-end;flex-wrap:wrap;padding-left:36px}
  .money-field{display:flex;flex-direction:column;gap:3px;width:96px}
  .money-field.qty{width:70px}
  .money-field label{font-family:var(--f-mono);font-size:9px;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-3)}
  .money-field input{font-family:var(--f-mono);font-size:14px;padding:8px 10px;border:1.5px solid var(--line-2);border-radius:8px;text-align:right;width:100%}
  .money-field input:focus{outline:none;border-color:var(--accent);background:#fff}
  .money-field .price-input{border-color:var(--accent);background:rgba(42,111,219,.04);font-weight:600}
  .litem-total{font-family:var(--f-mono);font-weight:700;font-size:16px;color:var(--navy-900);min-width:110px;text-align:right}

  /* totals */
  .totals-grid{display:grid;grid-template-columns:1.3fr 1fr;gap:24px}
  .terms-area textarea{min-height:150px;resize:vertical;font-size:13px;line-height:1.6;font-family:var(--f-body)}
  .tbox{background:var(--bg-alt);border:1px solid var(--line);border-radius:var(--r);padding:18px}
  .trow{display:flex;justify-content:space-between;align-items:center;padding:8px 0;font-size:14px}
  .trow .tlabel{color:var(--ink-2);display:flex;align-items:center;gap:8px}
  .trow .tval{font-family:var(--f-mono);font-weight:600;color:var(--navy-900)}
  .trow input{width:64px;font-family:var(--f-mono);font-size:13px;padding:5px 8px;border:1.5px solid var(--line-2);border-radius:6px;text-align:right}
  .trow input:focus{outline:none;border-color:var(--accent)}
  .tgrand{margin-top:8px;padding-top:14px;border-top:2px solid var(--navy-900);display:flex;justify-content:space-between;align-items:baseline}
  .tgrand .tlabel{font-family:var(--f-head);font-weight:700;font-size:16px}
  .tgrand .tval{font-family:var(--f-mono);font-weight:700;font-size:26px;color:var(--accent)}

  /* preview overlay */
  .preview-ov{position:fixed;inset:0;z-index:100;background:rgba(10,22,40,.6);backdrop-filter:blur(4px);overflow:auto;padding:34px 16px;display:none}
  .preview-ov.open{display:block}
  .preview-bar{max-width:820px;margin:0 auto 16px;display:flex;align-items:center;gap:10px}
  .preview-bar .pv-title{color:#fff;font-family:var(--f-head);font-weight:700;font-size:16px}
  .preview-bar .spacer{margin-left:auto}
  .pv-review{display:flex;align-items:center;gap:7px;color:#cdd9e6;font-size:12.5px;font-family:var(--f-body);cursor:pointer;user-select:none}
  .pv-review input{accent-color:var(--accent);width:15px;height:15px}
  .quote-doc[dir=rtl] .qd-title{text-align:left}
  .quote-doc[dir=rtl] .qd-brand{flex-direction:row-reverse}
  .quote-doc[dir=rtl] .qd-table th,.quote-doc[dir=rtl] .qd-table td{text-align:right}
  .quote-doc[dir=rtl] .qd-table th.num,.quote-doc[dir=rtl] .qd-table td.num{text-align:left}
  .quote-doc[dir=rtl] .qd-totals{justify-content:flex-start}
  .quote-doc[dir=rtl] .qd-sign{text-align:right}

  /* the printable quotation */
  .quote-doc{max-width:820px;margin:0 auto;background:#fff;border-radius:10px;box-shadow:var(--shadow-lg);padding:48px 54px;color:var(--ink)}
  .qd-top{display:flex;justify-content:space-between;align-items:flex-start;border-bottom:3px solid var(--navy-900);padding-bottom:22px}
  .qd-brand{display:flex;align-items:center;gap:12px}
  .qd-brand .mk{width:46px;height:46px;flex:none}
  .qd-brand h1{font-family:var(--f-head);font-size:22px;font-weight:800;letter-spacing:-.02em}
  .qd-brand small{display:block;font-family:var(--f-mono);font-size:9px;letter-spacing:.18em;color:var(--ink-3);text-transform:uppercase;margin-top:2px}
  .qd-title{text-align:right}
  .qd-title .qt{font-family:var(--f-head);font-size:26px;font-weight:800;letter-spacing:.04em;color:var(--navy-900)}
  .qd-title .qmeta{font-family:var(--f-mono);font-size:11px;color:var(--ink-2);margin-top:8px;line-height:1.7}
  .qd-title .qmeta b{color:var(--navy-900)}
  .qd-parties{display:grid;grid-template-columns:1fr 1fr;gap:30px;margin-top:24px}
  .qd-party h5{font-family:var(--f-mono);font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--accent);margin:0 0 8px}
  .qd-party p{font-size:13px;line-height:1.6;color:var(--ink-2)}
  .qd-party b{color:var(--navy-900);font-size:14px}
  .qd-table{width:100%;border-collapse:collapse;margin-top:26px;font-size:12.5px}
  .qd-table th{background:var(--navy-900);color:#fff;text-align:left;padding:10px 12px;font-family:var(--f-head);font-size:11px;letter-spacing:.03em}
  .qd-table th.num,.qd-table td.num{text-align:right}
  .qd-table td{padding:11px 12px;border-bottom:1px solid var(--line);vertical-align:top}
  .qd-table .ti-name{font-family:var(--f-head);font-weight:600;color:var(--navy-900);font-size:13px}
  .qd-table .ti-code{font-family:var(--f-mono);font-size:10px;color:var(--accent)}
  .qd-table .ti-cert{font-family:var(--f-mono);font-size:10px;color:#0a7a3f;font-weight:600;margin-top:4px}
  .qd-table .ti-spec{color:var(--ink-3);font-size:11px;margin-top:3px;line-height:1.5}
  .qd-table .ti-desc{color:var(--ink-2);font-size:11.5px;margin-top:4px;line-height:1.5}
  .qd-table td.num{font-family:var(--f-mono);white-space:nowrap}
  .qd-totals{display:flex;justify-content:flex-end;margin-top:18px}
  .qd-totals .tt{width:280px}
  .qd-totals .ttrow{display:flex;justify-content:space-between;padding:6px 0;font-size:13px;color:var(--ink-2)}
  .qd-totals .ttrow .v{font-family:var(--f-mono);color:var(--navy-900);font-weight:600}
  .qd-totals .ttgrand{display:flex;justify-content:space-between;margin-top:8px;padding-top:12px;border-top:2px solid var(--navy-900)}
  .qd-totals .ttgrand .l{font-family:var(--f-head);font-weight:700;font-size:15px}
  .qd-totals .ttgrand .v{font-family:var(--f-mono);font-weight:700;font-size:22px;color:var(--accent)}
  .qd-terms{margin-top:30px;padding-top:20px;border-top:1px solid var(--line)}
  .qd-terms h5{font-family:var(--f-mono);font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--accent);margin:0 0 10px}
  .qd-terms .tt-body{font-size:11.5px;color:var(--ink-2);line-height:1.7;white-space:pre-wrap}
  .qd-foot{margin-top:34px;display:grid;grid-template-columns:1fr 1fr;gap:30px;align-items:end}
  .qd-sign{border-top:1px solid var(--ink-3);padding-top:8px;font-size:11px;color:var(--ink-3);font-family:var(--f-mono)}
  .qd-badges{display:flex;gap:6px;flex-wrap:wrap;justify-content:flex-end}
  .qd-legal{margin-top:30px;padding-top:16px;border-top:1px solid var(--line);font-family:var(--f-mono);font-size:10px;color:var(--ink-3);text-align:center;line-height:1.7}

  @media (max-width:1080px){
    .admin-wrap{grid-template-columns:1fr}
    .palette{position:static;max-height:none}
    .plist{max-height:340px}
    .meta-grid{grid-template-columns:repeat(2,1fr)}
    .totals-grid{grid-template-columns:1fr}
  }
  @media (max-width:560px){
    .meta-grid{grid-template-columns:1fr}
    .ad-field.col2{grid-column:span 1}
    .litem-money{padding-left:0;justify-content:space-between}
    .quote-doc{padding:30px 22px}
    .qd-top,.qd-parties,.qd-foot{grid-template-columns:1fr;flex-direction:column;gap:16px;text-align:left}
    .qd-title{text-align:left}
  }

  /* PRINT */
  @media print{
    body{background:#fff}
    .abar,.admin-wrap,.preview-bar,.wa-float{display:none!important}
    .preview-ov{position:static;display:block!important;background:#fff;padding:0;backdrop-filter:none}
    .quote-doc{box-shadow:none;border-radius:0;max-width:100%;padding:0}
    @page{margin:14mm}
  }
  /* RTL admin (Arabic) */
  html[dir=rtl] .abar-actions{margin-left:0;margin-right:auto}
  html[dir=rtl] .palette-head,html[dir=rtl] .pitem,html[dir=rtl] .ad-field,html[dir=rtl] .cfg-pick,html[dir=rtl] .card2-head,html[dir=rtl] .money-field label,html[dir=rtl] .trow{text-align:right}
  html[dir=rtl] .pitem{flex-direction:row-reverse}
  html[dir=rtl] .card2-head .hint{margin-left:0;margin-right:auto}
  html[dir=rtl] .litem-money{padding-left:0;padding-right:36px}
  html[dir=rtl] .pv-review{flex-direction:row-reverse}
</style>
</head>
<body>

<header class="abar">
  <div class="abar-in">
    <a class="brand" href="index.html"><span class="mark" aria-hidden="true"><img src="assets/logo-amblem.svg" class="mk-amblem" alt=""></span><span><img src="assets/logo-type.svg" class="brand-logotype" alt="NETFLOW"><small>Quotation Builder</small></span></a>
    <span class="atag">Admin</span>
    <div class="abar-actions">
      <div class="cur-select" title="Output language">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#7f93a8" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M3 12h18M12 3a14 14 0 010 18M12 3a14 14 0 000 18"/></svg>
        <select id="langSel"><option value="en">English</option><option value="tr">Türkçe</option><option value="ar">العربية</option><option value="ru">Русский</option></select>
      </div>
      <div class="cur-select">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#7f93a8" stroke-width="2"><path d="M12 1v22M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/></svg>
        <select id="curSel"><option value="USD">USD $</option><option value="EUR">EUR €</option><option value="TRY">TRY ₺</option></select>
      </div>
      <button class="abtn ghost" id="btnNew"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>New</button>
      <button class="abtn" id="btnSave"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2zM17 21v-8H7v8M7 3v5h8"/></svg>Save Draft</button>
      <button class="abtn primary" id="btnPreview"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>Preview &amp; Print</button>
    </div>
  </div>
</header>

<div class="admin-wrap">
  <!-- PRODUCT PALETTE -->
  <aside class="palette">
    <div class="palette-head">
      <h3>Add Products <span class="n" id="palCount">19</span></h3>
      <div class="psearch">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4-4"/></svg>
        <input id="palSearch" placeholder="Search instruments…">
      </div>
      <div class="pcats" id="palCats">
        <button class="pcat on" data-c="all">All</button>
        <button class="pcat" data-c="flow">Flow</button>
        <button class="pcat" data-c="level">Level</button>
        <button class="pcat" data-c="switch">Switch</button>
        <button class="pcat" data-c="process">Process</button>
      </div>
    </div>
    <div class="plist" id="palList" data-i18n-skip></div>
  </aside>

  <!-- QUOTE SHEET -->
  <section class="sheet">
    <!-- meta + customer -->
    <div class="card2">
      <div class="card2-head"><h3>Quotation Details</h3><span class="hint">Auto-filled · editable</span></div>
      <div class="card2-body">
        <div class="meta-grid">
          <div class="ad-field"><label>Quote No.</label><input id="qNo"></div>
          <div class="ad-field"><label>Date</label><input id="qDate" type="date"></div>
          <div class="ad-field"><label>Valid Until</label><input id="qValid" type="date"></div>
          <div class="ad-field"><label>Prepared By</label><input id="qBy" placeholder="Sales Engineer"></div>
          <div class="ad-field col2"><label>Customer / Company</label><input id="cCompany" placeholder="e.g. Baghdad Water Authority"></div>
          <div class="ad-field"><label>Contact Person</label><input id="cContact" placeholder="Full name"></div>
          <div class="ad-field"><label>Country</label><input id="cCountry" placeholder="e.g. Iraq"></div>
          <div class="ad-field col2"><label>Email</label><input id="cEmail" type="email" placeholder="buyer@company.com"></div>
          <div class="ad-field col2"><label>Project / Reference</label><input id="cProject" placeholder="e.g. WTP-2026 intake metering"></div>
        </div>
      </div>
    </div>

    <!-- line items -->
    <div class="card2">
      <div class="card2-head"><h3>Line Items</h3><span class="hint" id="itemHint">Click products on the left to add</span></div>
      <div id="itemsBox" data-i18n-skip></div>
    </div>

    <!-- totals + terms -->
    <div class="card2">
      <div class="card2-head"><h3>Totals &amp; Terms</h3></div>
      <div class="card2-body">
        <div class="totals-grid">
          <div class="terms-area">
            <div class="ad-field"><label>Terms &amp; Conditions (pre-written, edit freely)</label><textarea id="qTerms"></textarea></div>
          </div>
          <div class="tbox">
            <div class="trow"><span class="tlabel">Subtotal</span><span class="tval" id="tSub">, </span></div>
            <div class="trow"><span class="tlabel">Discount <input id="tDisc" type="number" min="0" max="100" value="0">%</span><span class="tval" id="tDiscVal">, </span></div>
            <div class="trow"><span class="tlabel">Transport &amp; Field Visit</span><span class="tval"><input id="tTravel" type="number" min="0" step="0.01" value="0" style="width:80px;text-align:right;font-family:var(--f-mono);font-size:13px;padding:5px 8px;border:1.5px solid var(--line-2);border-radius:6px"></span></div>
            <div class="trow"><span class="tlabel">VAT / KDV <input id="tVat" type="number" min="0" max="100" value="0">%</span><span class="tval" id="tVatVal">, </span></div>
            <div class="tgrand"><span class="tlabel">Grand Total</span><span class="tval" id="tGrand">, </span></div>
            <div style="font-family:var(--f-mono);font-size:10.5px;color:var(--ink-3);margin-top:10px;text-align:center">Export quotes are typically VAT-exempt (0%)</div>
          </div>
        </div>
      </div>
    </div>
  </section>
</div>

<!-- PREVIEW OVERLAY -->
<div class="preview-ov" id="previewOv">
  <div class="preview-bar">
    <span class="pv-title">Quotation Preview</span>
    <div class="cur-select" style="background:rgba(255,255,255,.08)" title="Output language">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#9fb1c4" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M3 12h18M12 3a14 14 0 010 18M12 3a14 14 0 000 18"/></svg>
      <select id="pvLang"><option value="en">English</option><option value="tr">Türkçe</option><option value="ar">العربية</option><option value="ru">Русский</option></select>
    </div>
    <label class="pv-review"><input type="checkbox" id="pvReview"> <span>Show English meaning</span></label>
    <div class="spacer"></div>
    <button class="abtn ghost" id="btnClosePv" style="color:#fff;border-color:rgba(255,255,255,.25)">Close</button>
    <button class="abtn primary" id="btnPrint"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9V2h12v7M6 18H4a2 2 0 01-2-2v-5a2 2 0 012-2h16a2 2 0 012 2v5a2 2 0 01-2 2h-2M6 14h12v8H6z"/></svg>Print / Save PDF</button>
  </div>
  <div class="quote-doc" id="quoteDoc" data-i18n-skip></div>
</div>

<script src="assets/i18n-dict.js"></script>
<script src="assets/i18n.js"></script>
<script src="assets/quote.js"></script>
</body>
</html>
